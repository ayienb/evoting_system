<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | UTHM E-Voting</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg-dark: #0f0c29; --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --primary-purple: #9d50bb; --accent-magenta: #d946ef; --text-white: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
            --danger: #ff7675; --success: #00b894; --text-gray: #b3b3b3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-gradient); color: var(--text-white); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem 5%; }
        
        .blob-bg { position: absolute; width: 600px; height: 600px; background: linear-gradient(180deg, #6a11cb 0%, #d946ef 100%); border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.3; }
        .recovery-card { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 3rem; width: 100%; max-width: 440px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; color: white; }
        .header p { color: #fff; opacity: 0.85; font-size: 0.9rem; line-height: 1.4; }
        
        .info-banner { background: rgba(0, 184, 148, 0.15); border: 1px solid var(--success); color: var(--success); padding: 12px; border-radius: 8px; font-size: 0.8rem; text-align: center; margin-bottom: 1.5rem; font-weight: 500; }
        
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-gray); font-weight: 500; }
        .input-wrapper { position: relative; width: 100%; }
        .input-group input { width: 100%; padding: 14px 15px 14px 45px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: white; outline: none; font-size: 0.95rem; }
        .input-group input:focus { border-color: var(--accent-magenta); }
        .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-gray); font-size: 1.2rem; }
        
        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(90deg, var(--primary-purple), var(--accent-magenta)); border: none; border-radius: 8px; color: white; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(217, 70, 239, 0.4); }
    </style>
</head>
<body>
    <div class="blob-bg"></div>

    <div class="recovery-card">
        <div class="header">
            <div style="font-size: 3rem; color: var(--accent-magenta); margin-bottom: 10px;"><i class='bx bx-check-shield'></i></div>
            <h2>Set New Password</h2>
            <p>Your identity token was verified securely. Please enter your new login credentials.</p>
        </div>
        
        <div class="info-banner">
            <i class='bx bx-info-circle'></i> Use a strong password with at least 8 characters.
        </div>

        <form action="/reset-password/{{ token }}" method="POST" onsubmit="return validatePasswords()">
            <div class="input-group">
                <label>Create New Password</label>
                <div class="input-wrapper">
                    <i class='bx bx-lock-alt input-icon'></i>
                    <input type="password" id="new_pwd" name="new_password" placeholder="Minimum 8 characters" required>
                </div>
            </div>
            
            <div class="input-group">
                <label>Confirm Your Password</label>
                <div class="input-wrapper">
                    <i class='bx bx-check-double input-icon'></i>
                    <input type="password" id="confirm_pwd" name="confirm_password" placeholder="Repeat your new password" required>
                </div>
            </div>
            <p id="error-msg" style="color: var(--danger); font-size: 0.85rem; text-align: center; display: none; margin-bottom: 10px;"></p>
            
            <button type="submit" class="btn-submit">Sync & Apply Password</button>
        </form>
    </div>

    <script>
        function validatePasswords() {
            const p1 = document.getElementById('new_pwd').value;
            const p2 = document.getElementById('confirm_pwd').value;
            const errorElement = document.getElementById('error-msg');
            
            if (p1.length < 8) {
                errorElement.innerText = "Password must be at least 8 characters.";
                errorElement.style.display = "block";
                return false;
            }
            if (p1 !== p2) {
                errorElement.innerText = "Passwords do not match!";
                errorElement.style.display = "block";
                return false;
            }
            return true; // Form submits to backend and redirects to home logic
        }
    </script>
</body>
</html>
